appId: com.yappie.client
productName: Yappie
copyright: Copyright © 2025 Yappie

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json

asarUnpack:
  - node_modules/application-loopback/bin/**/*

win:
  target:
    - target: nsis
      arch: x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: Yappie-Setup.exe

publish:
  provider: github
  owner: eliaszech
  repo: yappie-client
  releaseType: release
