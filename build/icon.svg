<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1f26"/>
      <stop offset="100%" stop-color="#0e1014"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DE0D2"/>
      <stop offset="100%" stop-color="#39C6BA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- voice wave bars, symmetric around the Y -->
  <g fill="url(#accent)" filter="url(#glow)">
    <rect x="72"  y="232" width="22" height="48"  rx="11"/>
    <rect x="112" y="208" width="22" height="96"  rx="11"/>
    <rect x="152" y="176" width="22" height="160" rx="11"/>

    <rect x="338" y="176" width="22" height="160" rx="11"/>
    <rect x="378" y="208" width="22" height="96"  rx="11"/>
    <rect x="418" y="232" width="22" height="48"  rx="11"/>
  </g>

  <!-- Y, central, thick, slightly inset so the bars frame it -->
  <g fill="url(#accent)" filter="url(#glow)">
    <path d="
      M 196 144
      L 240 144
      L 256 200
      L 272 144
      L 316 144
      L 282 244
      L 282 368
      L 230 368
      L 230 244
      Z
    "/>
  </g>

  <!-- subtle inner border -->
  <rect x="6" y="6" width="500" height="500" rx="112" ry="112" fill="none" stroke="rgba(57,198,186,0.18)" stroke-width="2"/>
</svg>
